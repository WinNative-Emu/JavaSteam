name: WinNative Release

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - 'tools/**'

permissions:
  contents: write

concurrency:
  group: winnative-release
  cancel-in-progress: true

env:
  RELEASE_TAG: winnative-latest
  MAVEN_BRANCH: winnative-maven
  GROUP_ID: in.dragonbra
  VERSION: 1.8.1-SNAPSHOT

jobs:
  release:
    name: Build and publish latest release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build artifacts and POMs
        run: ./gradlew build generatePomFileForMavenJavaPublication -x signMavenJavaPublication

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/staging/jars dist/staging/maven-repository
          group_path="${GROUP_ID//.//}"

          find . -path '*/build/libs/*.jar' -type f -print0 |
            while IFS= read -r -d '' jar; do
              rel="${jar#./}"
              module="${rel%%/build/libs/*}"
              if [[ "$module" == "$rel" ]]; then
                module="javasteam"
              fi
              mkdir -p "dist/staging/jars/$module"
              cp "$jar" "dist/staging/jars/$module/"

              artifact="$module"
              target_dir="dist/staging/maven-repository/$group_path/$artifact/$VERSION"
              mkdir -p "$target_dir"
              cp "$jar" "$target_dir/"
            done

          find . -path '*/build/publications/mavenJava/pom-default.xml' -type f -print0 |
            while IFS= read -r -d '' pom; do
              rel="${pom#./}"
              module="${rel%%/build/publications/mavenJava/pom-default.xml}"
              if [[ "$module" == "$rel" ]]; then
                module="javasteam"
              fi

              artifact="$module"
              target_dir="dist/staging/maven-repository/$group_path/$artifact/$VERSION"
              mkdir -p "$target_dir"
              cp "$pom" "$target_dir/$artifact-$VERSION.pom"
            done

          (
            cd dist/staging/jars
            zip -r ../../javasteam-jars.zip .
          )

          (
            cd dist/staging/maven-repository
            zip -r ../../javasteam-maven-repository.zip .
          )

          {
            echo "# WinNative JavaSteam CI build"
            echo
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Built by: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Maven repo: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${MAVEN_BRANCH}/"
            echo
            echo "Assets:"
            echo "- javasteam-jars.zip: compiled jar, source jar, and javadoc jar outputs grouped by module."
            echo "- javasteam-maven-repository.zip: Maven repository layout for manual/offline use."
          } > dist/release-notes.md

      - name: Publish unzipped Maven repository
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="${RUNNER_TEMP}/javasteam-maven-repository"
          worktree_dir="${RUNNER_TEMP}/javasteam-maven-branch"
          rm -rf "$publish_dir" "$worktree_dir"
          mkdir -p "$publish_dir"
          cp -R dist/staging/maven-repository/. "$publish_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$MAVEN_BRANCH" || true

          if git show-ref --verify --quiet "refs/remotes/origin/$MAVEN_BRANCH"; then
            git worktree add "$worktree_dir" "origin/$MAVEN_BRANCH"
          else
            git worktree add --detach "$worktree_dir"
            git -C "$worktree_dir" checkout --orphan "$MAVEN_BRANCH"
          fi

          find "$worktree_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$publish_dir"/. "$worktree_dir"/
          touch "$worktree_dir/.nojekyll"

          git -C "$worktree_dir" add -A
          if git -C "$worktree_dir" diff --cached --quiet; then
            echo "Maven repository is already up to date."
          else
            git -C "$worktree_dir" commit -m "Publish JavaSteam Maven artifacts for ${GITHUB_SHA}"
            git -C "$worktree_dir" push origin "HEAD:$MAVEN_BRANCH"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: javasteam-release
          path: |
            dist/javasteam-jars.zip
            dist/javasteam-maven-repository.zip

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release delete "$RELEASE_TAG" --cleanup-tag --yes || true
          gh release create "$RELEASE_TAG" \
            dist/javasteam-jars.zip \
            dist/javasteam-maven-repository.zip \
            --target "$GITHUB_SHA" \
            --title "WinNative JavaSteam latest (${GITHUB_SHA::7})" \
            --notes-file dist/release-notes.md \
            --latest
